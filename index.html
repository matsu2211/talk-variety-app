
<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>いろいろトーク</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Zen Maru Gothic"', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Zen Maru Gothic', sans-serif;
        background-color: #fffaf0; /* Floral White - warm cream */
        background-image: 
          radial-gradient(at 0% 0%, hsla(28,100%,95%,1) 0, transparent 50%), 
          radial-gradient(at 50% 0%, hsla(34,100%,97%,1) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(22,100%,94%,1) 0, transparent 50%);
        min-height: 100vh;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #f3e8d2;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #e9dcb3;
      }
    </style></head>
  <body class="text-stone-700 font-medium">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
